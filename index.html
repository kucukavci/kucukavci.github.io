<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parke Yerleşim</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: auto;
      padding: 10px;
      background: #f9f9f9;
    }
    h2 {
      margin-bottom: 10px;
    }
    .form-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .form-group label {
      flex: 1 1 200px;
      font-size: 14px;
    }
    .form-group input {
      flex: 2 1 150px;
      padding: 6px;
      font-size: 14px;
    }
    button {
      margin: 8px 6px 4px 0;
      padding: 8px 14px;
      font-size: 14px;
      border: none;
      background-color: #0078d4;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #005a9e;
    }
    canvas {
      border: 1px solid #444;
      width: 100%;
      margin-top: 10px;
      touch-action: none;
      background: #fff;
    }
    #tooltip {
      position: absolute;
      background: #222;
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    #stats {
      margin-top: 12px;
      font-size: 14px;
      background: #fff;
      padding: 8px;
      border-radius: 6px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h2>Parke Yerleşim Hesaplama</h2>

  <div class="form-group"><label>Oda Genişliği (cm):</label><input type="number" id="roomWidth" value="385" /></div>
  <div class="form-group"><label>Oda Yüksekliği (cm):</label><input type="number" id="roomHeight" value="200" /></div>
  <div class="form-group"><label>Parke Uzunluğu (cm):</label><input type="number" id="tileLength" value="120" /></div>
  <div class="form-group"><label>Parke Genişliği (cm):</label><input type="number" id="tileHeight" value="20" /></div>
  <div class="form-group"><label>Duvar Boşluğu (cm):</label><input type="number" id="margin" value="0" /></div>
  <div class="form-group"><label>Testere Payı (cm):</label><input type="number" id="cutLoss" value="0.3" /></div>
  <div class="form-group"><label>Kullanılabilir Minimum Parça (cm):</label><input type="number" id="minPiece" value="5" /></div>
  <div class="form-group">
    <label>Döşeme Yönü:</label>
    <select id="pattern">
      <option value="duz">Düz</option>
      <option value="zikzak">Zikzak</option>
    </select>
  </div>
  <div class="form-group">
    <label>Tema:</label>
    <select id="theme">
      <option value="acik">Açık</option>
      <option value="koyu">Koyu</option>
    </select>
  </div>

  <button onclick="drawFloor()">Parkeleri Yerleştir</button>
  <button onclick="downloadImage()">PNG Olarak Kaydet</button>
  <button onclick="downloadPDF()">📄 PDF Olarak Kaydet</button>

  <canvas id="canvas"></canvas>
  <div id="tooltip"></div>
  <div id="stats"></div>
    <script>
    let tiles = [];

    function drawFloor() {
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const tooltip = document.getElementById("tooltip");
      const statsDiv = document.getElementById("stats");
      tiles = [];

      const roomWidth = +roomWidthEl.value;
      const roomHeight = +roomHeightEl.value;
      const tileLength = +tileLengthEl.value;
      const tileHeight = +tileHeightEl.value;
      const margin = +marginEl.value;
      const cutLoss = +cutLossEl.value;
      const minPiece = +minPieceEl.value;
      const pattern = document.getElementById("pattern").value;
      const theme = document.getElementById("theme").value;

      const scale = 2;
      canvas.width = roomWidth * scale;
      canvas.height = roomHeight * scale;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      document.body.style.background = theme === "koyu" ? "#222" : "#f9f9f9";
      canvas.style.background = theme === "koyu" ? "#333" : "#fff";

      const usableW = roomWidth - margin * 2;
      const usableH = roomHeight - margin * 2;

      let y = margin;
      let leftPiece = null;
      let fullCount = 0;
      let cutCount = 0;
      let wasteArea = 0;
      const tileArea = tileLength * tileHeight;
      let rowIndex = 0;

      while (y + tileHeight <= margin + usableH) {
        let x = margin;
        const reverse = (pattern === "zikzak") && (rowIndex % 2 === 1);
        if (reverse) x = margin + usableW;

        if (leftPiece && leftPiece - cutLoss >= minPiece) {
          const usable = leftPiece - cutLoss;
          drawTile(ctx, reverse ? x - usable : x, y, usable, tileHeight, scale, true, theme);
          cutCount++;
          x = reverse ? x - usable : x + usable;
          leftPiece = null;
        }

        while ((reverse && x - tileLength >= margin) || (!reverse && x + tileLength <= margin + usableW)) {
          drawTile(ctx, reverse ? x - tileLength : x, y, tileLength, tileHeight, scale, false, theme);
          fullCount++;
          x = reverse ? x - tileLength : x + tileLength;
        }

        const kalan = reverse ? x - margin : (margin + usableW) - x;
        if (kalan > 1) {
          drawTile(ctx, reverse ? x - kalan : x, y, kalan, tileHeight, scale, true, theme);
          cutCount++;
          const remaining = tileLength - kalan;
          if ((remaining - cutLoss) >= minPiece) {
            leftPiece = remaining;
          } else {
            wasteArea += remaining * tileHeight;
          }
        }

        y += tileHeight;
        rowIndex++;
      }

      tooltip.style.display = "none";
      const totalUsed = (fullCount * tileArea) + (cutCount * tileArea);
      const fireRate = ((wasteArea / totalUsed) * 100).toFixed(2);
      statsDiv.innerHTML = `
        <strong>Toplam Parke:</strong> ${fullCount} tam, ${cutCount} kesilmiş<br>
        <strong>Fire Alanı:</strong> ${wasteArea.toFixed(1)} cm²<br>
        <strong>Fire Oranı:</strong> ${fireRate}%
      `;
    }

    function drawTile(ctx, x, y, w, h, scale, isCut, theme) {
      const sx = x * scale;
      const sy = y * scale;
      const sw = w * scale;
      const sh = h * scale;
      const label = `${w.toFixed(1)} cm`;

      const color = isCut ? (theme === "koyu" ? "#666" : "#f7ddb9") : (theme === "koyu" ? "#997755" : "#deb887");

      ctx.fillStyle = color;
      ctx.fillRect(sx, sy, sw, sh);
      ctx.strokeStyle = theme === "koyu" ? "#bbb" : "#8b5e3c";
      ctx.strokeRect(sx, sy, sw, sh);

      if (sw >= 40) {
        ctx.fillStyle = theme === "koyu" ? "#eee" : "#000";
        ctx.font = `${Math.min(sw / 6, 12)}px sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText(label, sx + sw / 2, sy + sh / 2 + 4);
      }

      tiles.push({ x: sx, y: sy, width: sw, height: sh, label });
    }

    canvas.addEventListener("click", function (e) {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const tooltip = document.getElementById("tooltip");

      let closest = null;
      let closestDist = Infinity;

      for (let tile of tiles) {
        const cx = tile.x + tile.width / 2;
        const cy = tile.y + tile.height / 2;
        const dx = x - cx;
        const dy = y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < closestDist && dist < 40) {
          closest = tile;
          closestDist = dist;
        }
      }

      if (closest) {
        tooltip.innerText = closest.label;
        tooltip.style.left = `${e.clientX + 10}px`;
        tooltip.style.top = `${e.clientY + 10}px`;
        tooltip.style.display = "block";
      } else {
        tooltip.style.display = "none";
      }
    });

    function downloadImage() {
      const canvas = document.getElementById("canvas");
      const link = document.createElement("a");
      link.download = "parke-yerlesim.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    // DOM referansları
    const roomWidthEl = document.getElementById("roomWidth");
    const roomHeightEl = document.getElementById("roomHeight");
    const tileLengthEl = document.getElementById("tileLength");
    const tileHeightEl = document.getElementById("tileHeight");
    const marginEl = document.getElementById("margin");
    const cutLossEl = document.getElementById("cutLoss");
    const minPieceEl = document.getElementById("minPiece");

  async function downloadPDF() {
    const canvas = document.getElementById("canvas");
    const stats = document.getElementById("stats").innerText;
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    const imgData = canvas.toDataURL("image/png");
    pdf.setFontSize(16);
    pdf.text("Parke Yerleşim Raporu", 20, 20);
    pdf.setFontSize(12);
    const lines = pdf.splitTextToSize(stats, 170);
    pdf.text(lines, 20, 30);
    pdf.addImage(imgData, "PNG", 15, 50, 180, 0);
    const today = new Date().toISOString().split("T")[0];
    pdf.save(`parke-raporu-${today}.pdf`);
  }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
